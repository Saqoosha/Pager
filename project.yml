name: CanopyCompanion
options:
  bundleIdPrefix: sh.saqoo
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: G5G54TCH8W
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
targets:
  CanopyCompanion:
    type: application
    platform: iOS
    sources:
      - Sources/CanopyCompanion
      - Sources/Shared
      # Avatars are also bundled with the extension; main app needs the same
      # PNGs to render per-source icons in the History list.
      - path: Sources/CanopyNotificationService/Avatars
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.saqoo.CanopyCompanion
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_FILE: Sources/CanopyCompanion/Info.plist
    entitlements:
      path: Sources/CanopyCompanion/CanopyCompanion.entitlements
      properties:
        aps-environment: development
        com.apple.developer.usernotifications.communication: true
        com.apple.security.application-groups:
          - group.sh.saqoo.CanopyCompanion
    dependencies:
      - target: CanopyNotificationService

  CanopyNotificationService:
    type: app-extension
    platform: iOS
    sources:
      - Sources/CanopyNotificationService
      - Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.saqoo.CanopyCompanion.NotificationService
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_FILE: Sources/CanopyNotificationService/Info.plist
    entitlements:
      path: Sources/CanopyNotificationService/NotificationService.entitlements
      properties:
        com.apple.security.application-groups:
          - group.sh.saqoo.CanopyCompanion
