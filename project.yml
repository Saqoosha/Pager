name: Pager
options:
  bundleIdPrefix: sh.saqoo
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: G5G54TCH8W
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
targets:
  Pager:
    type: application
    platform: iOS
    sources:
      - Sources/Pager
      - Sources/Shared
      # Avatars are also bundled with the extension; main app needs the same
      # PNGs to render per-source icons in the History list.
      - path: Sources/PagerNotificationService/Avatars
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.saqoo.Pager
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_FILE: Sources/Pager/Info.plist
    entitlements:
      path: Sources/Pager/Pager.entitlements
      properties:
        aps-environment: development
        com.apple.developer.usernotifications.communication: true
        com.apple.security.application-groups:
          - group.sh.saqoo.Pager
    dependencies:
      - target: PagerNotificationService

  PagerNotificationService:
    type: app-extension
    platform: iOS
    sources:
      - Sources/PagerNotificationService
      - Sources/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.saqoo.Pager.NotificationService
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_FILE: Sources/PagerNotificationService/Info.plist
    entitlements:
      path: Sources/PagerNotificationService/NotificationService.entitlements
      properties:
        com.apple.security.application-groups:
          - group.sh.saqoo.Pager
