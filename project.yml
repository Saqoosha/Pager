name: CanopyCompanion
options:
  bundleIdPrefix: sh.saqoo
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: G5G54TCH8W
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
targets:
  CanopyCompanion:
    type: application
    platform: iOS
    sources:
      - Sources/CanopyCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.saqoo.CanopyCompanion
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_CFBundleDisplayName: Canopy Companion
        INFOPLIST_KEY_UIBackgroundModes: remote-notification
    entitlements:
      path: Sources/CanopyCompanion/CanopyCompanion.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.sh.saqoo.CanopyCompanion
